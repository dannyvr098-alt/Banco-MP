<!DOCTYPE html>
<html lang="es">
<head>

<body>

                    <div class=" alerta-intentos">

                 <div class="grupo-entrada">
                        <label for="usuario">Usuario</label>
                         <input type="text" id="usuario" placeholder="Ej: daniela_viv" required>
                </div>
                            <div class="grupo-entrada">
                                    <label for="clave">Contraseña</label>
                                    <input type="password" id="clave" placeholder="......." required>
                            </div>
                                    <button type="submit" class="boton-entrar">Entrar al Sistema</button>
                         </form>     
             </div>
                    <div class="enlace-ayuda">
                         <a href="#">¿Olvidaste tu clave?</a>
                         <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
                    </div>
                
        </main>
                <script src="logica-ingreso.js"></script>
